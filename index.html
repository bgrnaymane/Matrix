eage, no chaos trail’."}}, "erwartung": {"name": {"de": "Erwartungen an Ehe & Zukunft", "en": "Expectations of Marriage & Future", "nl": "Verwachtingen van Huwelijk & Toekomst"}, "short": {"de": "Ehe & Zukunft", "en": "Marriage & future", "nl": "Huwelijk & toekomst"}, "note": {"de": "Deckungsgleichheit bei Vorstellungen von Ehe, Rollen, Prioritäten und Lebensplänen – hier entstehen sonst die stillen Dauerkonflikte.", "en": "Alignment on views of marriage, roles, priorities and life plans – otherwise the quiet, lasting conflicts start here.", "nl": "Overeenstemming over huwelijk, rollen, prioriteiten en levensplannen – anders ontstaan hier de stille, blijvende conflicten."}}, "haushalt": {"name": {"de": "Haushalt, Kochen & Alltag", "en": "Household, Cooking & Daily Life", "nl": "Huishouden, Koken & Dagelijks Leven"}, "short": {"de": "Haushalt", "en": "Household", "nl": "Huishouden"}, "note": {"de": "Alltagsteilung, Kochen und häusliche Zusammenarbeit – praktisch, aber ein häufiger Reibungspunkt.", "en": "Sharing chores, cooking and running a home together – practical, but a common friction point.", "nl": "Taakverdeling, koken en samen een huishouden runnen – praktisch, maar een veelvoorkomend wrijvingspunt."}}, "geld": {"name": {"de": "Umgang mit Geld", "en": "Handling Money", "nl": "Omgang met Geld"}, "short": {"de": "Geld", "en": "Money", "nl": "Geld"}, "note": {"de": "Finanzstreit ist eine der häufigsten Scheidungsursachen. Wichtig auch: redet sie nicht alle 5 Minuten über Geld / Materielles.", "en": "Money conflict is among the most common causes of divorce. Also key: she isn’t talking about money/status every 5 minutes.", "nl": "Geldconflict is een van de meest voorkomende scheidingsoorzaken. Ook belangrijk: praat zij niet om de 5 minuten over geld/materie."}}, "familie": {"name": {"de": "Familienbindung (Vater & Mutter)", "en": "Family Bonds (Father & Mother)", "nl": "Familieband (Vader & Moeder)"}, "short": {"de": "Familie", "en": "Family", "nl": "Familie"}, " ers is that she keeps growing.", "nl": "Voorkeur: een vergelijkbaar niveau (jij hebt een master) – bijv. arts, apotheker, tandarts, chemicus. Geen must als zij elders uitblinkt; belangrijk is dat zij zich blijft ontwikkelen."}}, "anziehung": {"name": {"de": "Anziehung & Attraktivität", "en": "Attraction & Looks", "nl": "Aantrekking & Uiterlijk"}, "short": {"de": "Anziehung", "en": "Attraction", "nl": "Aantrekking"}, "note": {"de": "Attraktivität getrennt nach Gesicht und Körper, plus deine persönlichen Vorlieben als flexible ‚passt-zu-mir‘-Skalen. Zählt real, wird langfristig aber überschätzt – als Basis, nicht als alleiniger Maßstab.", "en": "Attractiveness split into face and body, plus your personal preferences as flexible ‘fits-me’ scales. It counts, but is overrated long-term – a basis, not the sole measure.", "nl": "Aantrekkelijkheid gesplitst in gezicht en lichaam, plus jouw voorkeuren als flexibele ‘past-bij-mij’-schalen. Telt echt, maar wordt op lange termijn overschat – een basis, niet de enige maatstaf."}}, "aktiv": {"name": {"de": "Aktivität, Sport & Hobbys", "en": "Activity, Sport & Hobbies", "nl": "Activiteit, Sport & Hobby's"}, "short": {"de": "Aktivität", "en": "Activity", "nl": "Activiteit"}, "note": {"de": "Sportlichkeit/Ambition und geteilte Aktivität (Natur, Spazieren, eigene Hobbys) – ein guter Prädiktor für gemeinsame Zeit und Lebensstil.", "en": "Fitness/ambition and shared activity (nature, walks, her own hobbies) – a good predictor of shared time and lifestyle.", "nl": "Sportiviteit/ambitie en gedeelde activiteit (natuur, wandelen, eigen hobby's) – een goede voorspeller van gedeelde tijd en levensstijl."}}, "auftreten": {"name": {"de": "Kleidung, Auftreten & Pflege", "en": "Dress, Appearance & Grooming", "nl": "Kleding, Uitstraling & Verzorging"}, "short": {"de": "Auftreten", "en": "Appearance", "nl": "Uitstraling"}, "note": {"de": "Kleidungsstil, Bescheidenheit und Pflege – als ‚passt zu deinen Vorstellungen‘, nicht als ‚viel = schlecht‘. A     dealbreaker: (key==="din_m"||key==="din_nm"),
    note: catText(d.catKey,"note",lang),
    questions: d.questions.map(([qid,type])=>({ id:qid, type, text: qText(qid,lang) })),
  };
}

const buildCategories = (isMuslima, lang) => { const lg = lang || CURRENT_LANG; return _buildCategories(isMuslima, lg); };
const _buildCategories = (isMuslima, lang) =>
  isMuslima
    ? [makeCat("din_m",lang), makeCat("islamwissen",lang), ...BASE_ORDER.map((k)=>makeCat(k,lang))]
    : [makeCat("din_nm",lang), ...BASE_ORDER.map((k)=>makeCat(k,lang))];


// ── Gewichts-Infrastruktur ──
const ALL_CAT_IDS = ["din","islamwissen","reife","konflikt","vertrauen","erwartung",
  "haushalt","geld","familie","freunde","mutter","bildung","anziehung","aktiv",
  "auftreten","lebensstil","standort","schwieger","gesundheit","kinderplan"];

const DEFAULT_WEIGHTS = {
  muslima: { din:12, islamwissen:6, reife:9, konflikt:9, vertrauen:8, anziehung:8, erwartung:5, mutter:4, familie:3, freunde:3, geld:3, haushalt:3, bildung:2, aktiv:3, auftreten:5, lebensstil:5, kinderplan:4, standort:3, schwieger:3, gesundheit:2 },
  nicht:   { din:18, islamwissen:0, reife:9, konflikt:9, vertrauen:8, anziehung:8, erwartung:5, mutter:4, familie:3, freunde:3, geld:3, haushalt:3, bildung:2, aktiv:3, auftreten:5, lebensstil:5, kinderplan:4, standort:3, schwieger:3, gesundheit:2 },
};

// Preset-IDs + Emphasis (Text/Namen kommen aus TRANS.PRESETS)
const PRESET_IDS = ["ausgewogen","konservativ","charakter","praktisch","anziehung","relig_charakter","charakter_anziehung","konserv_praktisch","ganzheitlich"];
// Emphasis-Multiplikatoren. Betonte Kategorien werden kräftig angehoben (>1),
// bewusst zurückgestellte deutlich gedämpft (<1), damit eine gewählte Präferenz
// im Ergebnis klar durchschlägt und nicht von Allroundern überdeckt wird.
const PRESET_EMPH = {
  ausgewogen:{},
  konservativ:{ din:2.6, islamwissen:2.6, auftreten:2.2, schwieger:1.8, familie:1.8, mutter:1.6, kinderplan:1.6, anziehung:0.3, lebensstil:0.3, aktiv:0.5, erwartung:0.8 },
  charakter:{ konflikt:2.6, reife:2.6, vertrauen:2.2, freunde:1.7, erwartung:1.4, mutter:1.3, anziehung:0.35, auftreten:0.35, lebensstil:0.4, aktiv:0.6 },
  praktisch:{ haushalt:2.6, geld:2.6, standort:2.2, gesundheit:2.2, kinderplan:1.7, erwartung:1.5, anziehung:0.4, lebensstil:0.4, auftreten:0.5, islamwissen:0.7 },
  anziehung:{ anziehung:3.0, aktiv:2.2, lebensstil:2.2, auftreten:1.9, konflikt:0.55, reife:0.6, geld:0.6, haushalt:0.6, islamwissen:0.6 },
  relig_charakter:{ din:2.1, islamwissen:2.0, konflikt:2.0, reife:2.0, vertrauen:1.7, auftreten:1.4, anziehung:0.4, lebensstil:0.45, aktiv:0.6 },
  charakter_anziehung:{ konflikt:2.0, reife:1.9, vertrauen:1.7, anziehung:2.2, aktiv:1.6, auftreten:1.5, haushalt:0.55, geld:0.6, din:0.8 },
  konserv_praktisch:{ din:2.0, islamwissen:1.9, auftreten:1.7, familie:1.5, geld:2.0, haushalt:2.0, standort:1.7, gesundheit:1.6, kinderplan:1.4, anziehung:0.4, lebensstil:0.4, aktiv:0.6 },
  ganzheitlich:{ haushalt:1.35, geld:1.35, familie:1.35, freunde:1.35, bildung:1.4, aktiv:1.35, auftreten:1.25, lebensstil:1.25, standort:1.35, schwieger:1.35, gesundheit:1.4, kinderplan:1.25, mutter:1.25, erwartung:1.3 },
};
const presets = (lang) => PRESET_IDS.map((id)=>({ id, name:L(TRANS.PRESETS[id].name,lang), desc:L(TRANS.PRESETS[id].desc,lang), emph:PRESET_EMPH[id] }));

// Fragebogen-IDs + Effekte (Text aus TRANS.QUEST)
const QUESTIONNAIRE = [
  { id:"q_relig", effect:(v)=>({ din:1+v*1.8, islamwissen:1+v*1.8, auftreten:1+v*1.1, schwieger:1+v*0.6, anziehung:1-v*0.6, lebensstil:1-v*0.5 }) },
  { id:"q_aussehen", effect:(v)=>({ anziehung:1+v*1.8, auftreten:1+v*1.0, aktiv:1+v*0.6, konflikt:1-v*0.45, reife:1-v*0.45 }) },
  { id:"q_emotion", effect:(v)=>({ konflikt:1+v*1.4, reife:1+v*1.2, vertrauen:1+v*0.9, haushalt:1-v*0.6, geld:1-v*0.5, standort:1-v*0.4 }) },
  { id:"q_familie", effect:(v)=>({ familie:1+v*1.4, mutter:1+v*1.4, kinderplan:1+v*1.4, schwieger:1+v*1.1 }) },
  { id:"q_lifestyle", effect:(v)=>({ lebensstil:1+v*1.7, aktiv:1+v*1.7, anziehung:1+v*0.5 }) },
  { id:"q_finanz", effect:(v)=>({ geld:1+v*1.7, haushalt:1+v*1.3, standort:1+v*0.5 }) },
  { id:"q_bildung", effect:(v)=>({ bildung:1+v*2.2, reife:1+v*0.5 }) },
];

function computeWeights(branch, emph) {
  const base = DEFAULT_WEIGHTS[branch]; const raw = {}; let sum = 0;
  ALL_CAT_IDS.forEach((id) => { const b = base[id]||0; const m = emph&&emph[id]?emph[id]:1; const v=b*m; raw[id]=v; sum+=v; });
  const out = {}; ALL_CAT_IDS.forEach((id)=>{ out[id]= sum>0?Math.round((raw[id]/sum)*100):0; });
  let s2 = ALL_CAT_IDS.reduce((a,id)=>a+out[id],0);
  if (s2!==100){ let maxId=ALL_CAT_IDS[0]; ALL_CAT_IDS.forEach((id)=>{ if(out[id]>out[maxId]) maxId=id; }); out[maxId]+=(100-s2); }
  return out;
}
function invertEffect(map){ const out={}; Object.keys(map).forEach((id)=>{ out[id]= map[id]!==0?1/map[id]:1; }); return out; }
function combinedEmphasis(presetId, answers) {
  const emph={}; const pe = PRESET_EMPH[presetId]||{};
  ALL_CAT_IDS.forEach((id)=>{ emph[id]= pe[id]||1; });
  if (answers){
    QUESTIONNAIRE.forEach((q)=>{
      const v = typeof answers[q.id]==="number"?answers[q.id]:0.5;
      const centered=(v-0.5)*2;
      const factorMap = centered>=0 ? q.effect(centered) : invertEffect(q.effect(-centered));
      Object.keys(factorMap).forEach((id)=>{ emph[id]=(emph[id]||1)*factorMap[id]; });
    });
  }
  return emph;
}

const emptyPartner = (name) => ({ name, isMuslima: true, deal: {}, answers: {}, gut: 5 });

function categoryScore(cat, answers) {
  const vals = cat.questions.map((q) => answers[q.id]).filter((v) => typeof v === "number");
  if (vals.length === 0) return null;
  return vals.reduce((a, b) => a + b, 0) / vals.length;
}
function catWeight(cat, weights) {
  if (weights && typeof weights[cat.id] === "number") return weights[cat.id];
  return cat.weight;
}
function totalScore(p, weights) {
  const cats = buildCategories(p.isMuslima);
  let total = 0;
  cats.forEach((cat) => {
    const s = categoryScore(cat, p.answers);
    if (s !== null) { total += (s / 10) * catWeight(cat, weights); }
  });
  return total;
}
function failedDealbreakers(p) {
  return dealbreakers(CURRENT_LANG).filter((d) => p.deal[d.id] === false);
}

/* ══════════════ App ══════════════ */
function App() {
  const [partners, setPartners] = useState([]);
  const [wish, setWish] = useState({});
  const [tab, setTab] = useState("gewichtung");
  const [lang, setLang] = useState("de");
  CURRENT_LANG = lang;
  const [presetId, setPresetId] = useState("ausgewogen");
  const [qAnswers, setQAnswers] = useState({});
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    try {
      const a = localStorage.getItem("pw3_partners");
      if (a) setPartners(JSON.parse(a));
      const w = localStorage.getItem("pw3_wish");
      if (w) setWish(JSON.parse(w));
      const pr = localStorage.getItem("pw3_preset");
      if (pr) setPresetId(JSON.parse(pr));
      const qa = localStorage.getItem("pw3_qanswers");
      if (qa) setQAnswers(JSON.parse(qa));
      const lg = localStorage.getItem("pw3_lang");
      if (lg) setLang(JSON.parse(lg));
    } catch (e) {}
    setLoaded(true);
  }, []);
  useEffect(() => {
    if (!loaded) return;
    try {
      localStorage.setItem("pw3_partners", JSON.stringify(partners));
      localStorage.setItem("pw3_wish", JSON.stringify(wish));
      localStorage.setItem("pw3_preset", JSON.stringify(presetId));
      localStorage.setItem("pw3_qanswers", JSON.stringify(qAnswers));
      localStorage.setItem("pw3_lang", JSON.stringify(lang));
    } catch (e) { console.error(e); }
  }, [partners, wish, presetId, qAnswers, lang, loaded]);

  // Effektive Gewichte je Zweig aus Preset + Fragebogen
  const emph = combinedEmphasis(presetId, qAnswers);
  const weightsMuslima = computeWeights("muslima", emph);
  const weightsNicht = computeWeights("nicht", emph);
  const weightsFor = (isMuslima) => (isMuslima ? weightsMuslima : weightsNicht);

  const addPartner = () => setPartners([...partners, emptyPartner(`Person ${partners.length + 1}`)]);
  const updatePartner = (idx, patch) => setPartners(partners.map((p, i) => (i === idx ? { ...p, ...patch } : p)));
  const removePartner = (idx) => setPartners(partners.filter((_, i) => i !== idx));
  const setAnswer = (idx, qid, val) => { const p = partners[idx]; updatePartner(idx, { answers: { ...p.answers, [qid]: val } }); };
  const setDeal = (idx, did, val) => { const p = partners[idx]; updatePartner(idx, { deal: { ...p.deal, [did]: val } }); };

  // ── Echte lokale Sicherung: Export / Import als Datei ──
  const exportData = () => {
    const payload = { version: 3, exportedAt: new Date().toISOString(), partners, wish };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "partnerwahl-daten.json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };
  const importData = (file) => {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (Array.isArray(data.partners)) setPartners(data.partners);
        if (data.wish && typeof data.wish === "object") setWish(data.wish);
      } catch (e) { alert("Datei konnte nicht gelesen werden – ist es die richtige JSON-Datei?"); }
    };
    reader.readAsText(file);
  };

  return (
    <div style={ST.page}>
      <div style={ST.container}>
        <header style={ST.header}>
          <div style={ST.topRow}>
            <div style={ST.kicker}>{L(TRANS.UI.kicker, lang)}</div>
            <div style={ST.langWrap}>
              <span style={ST.langHint}>{L(TRANS.UI.langHint, lang)}</span>
              <div style={ST.langSwitch}>
                {[["de","DE"],["en","EN"],["nl","NL"]].map(([code,lbl])=>(
                  <button key={code} onClick={()=>setLang(code)}
                    style={{...ST.langBtn,...(lang===code?ST.langBtnActive:{})}}>{lbl}</button>
                ))}
              </div>
            </div>
          </div>
          <h1 style={ST.h1}>{L(TRANS.UI.title, lang)}</h1>
          <p style={ST.sub}>{L(TRANS.UI.sub, lang)}</p>
          <div style={ST.backupRow}>
            <button style={ST.backupBtn} onClick={exportData}>{L(TRANS.UI.export, lang)}</button>
            <label style={ST.backupBtnAlt}>
              {L(TRANS.UI.import, lang)}
              <input type="file" accept="application/json,.json" style={{ display: "none" }}
                onChange={(e) => { if (e.target.files && e.target.files[0]) importData(e.target.files[0]); e.target.value=""; }} />
            </label>
          </div>
        </header>

        <nav style={ST.tabs}>
          {[["gewichtung","tab_gewichtung"],["bewerten","tab_bewerten"],["radar","tab_radar"],["ranking","tab_ranking"],["wunsch","tab_wunsch"],["kriterien","tab_kriterien"]].map(([id,key])=>(
            <button key={id} onClick={()=>setTab(id)} style={{...ST.tab,...(tab===id?ST.tabActive:{})}}>{L(TRANS.UI[key], lang)}</button>
          ))}
        </nav>

        {tab==="gewichtung" && <Gewichtung {...{presetId,setPresetId,qAnswers,setQAnswers,weightsMuslima,weightsNicht}} />}
        {tab==="bewerten" && <Bewerten {...{partners,addPartner,updatePartner,removePartner,setAnswer,setDeal,weightsFor}} />}
        {tab==="radar" && <RadarView {...{partners,wish,weightsFor}} />}
        {tab==="ranking" && <Ranking partners={partners} weightsFor={weightsFor} />}
        {tab==="wunsch" && <Wunsch {...{wish,setWish}} />}
        {tab==="kriterien" && <Kriterien weightsMuslima={weightsMuslima} weightsNicht={weightsNicht} />}

        <footer style={ST.footer}>{L(TRANS.UI.footer, lang)}</footer>
      </div>
    </div>
  );
}

/* ══════════════ Bewerten ══════════════ */
function Bewerten({ partners, addPartner, updatePartner, removePartner, setAnswer, setDeal, weightsFor }) {
  const [open, setOpen] = useState({});
  const toggle = (k) => setOpen((s) => ({ ...s, [k]: !s[k] }));

  return (
    <div>
      {partners.length===0 && <div style={ST.empty}>{L(TRANS.UI.empty_person, CURRENT_LANG)}</div>}
      {partners.map((p, idx) => {
        const cats = buildCategories(p.isMuslima);
        const failed = failedDealbreakers(p);
        return (
          <div key={idx} style={ST.card}>
            <div style={ST.cardHead}>
              <input value={p.name} onChange={(e)=>updatePartner(idx,{name:e.target.value})} style={ST.nameInput}/>
              <button onClick={()=>removePartner(idx)} style={ST.removeBtn}>{L(TRANS.UI.remove, CURRENT_LANG)}</button>
            </div>

            <div style={ST.toggleRow}>
              <span style={ST.toggleLabel}>{L(TRANS.UI.isMuslima, CURRENT_LANG)}</span>
              <div style={ST.dbButtons}>
                {[["yes",true],["no",false]].map(([lk,val])=>(
                  <button key={lk} onClick={()=>updatePartner(idx,{isMuslima:val})}
                    style={{...ST.dbBtn,...(p.isMuslima===val?ST.toggleActive:{})}}>{L(TRANS.UI[lk],CURRENT_LANG)}</button>
                ))}
              </div>
            </div>

            {/* Deal-Breaker-Block */}
            <div style={ST.dealBox}>
              <div style={ST.dealTitle}>{L(TRANS.UI.dealTitle, CURRENT_LANG)}</div>
              {dealbreakers(CURRENT_LANG).map((d)=>(
                <div key={d.id} style={ST.dealRow}>
                  <span style={ST.dealText}>{d.text}</span>
                  <div style={ST.dbButtons}>
                    {[["yes",true],["no",false]].map(([lk,val])=>(
                      <button key={lk} onClick={()=>setDeal(idx,d.id,val)}
                        style={{...ST.dbBtnSm,...(p.deal[d.id]===val?(val?ST.dbYes:ST.dbNo):{})}}>{L(TRANS.UI[lk],CURRENT_LANG)}</button>
                    ))}
                  </div>
                </div>
              ))}
              {failed.length>0 && (
                <div style={ST.dbWarn}>
                  {failed.length}{L(TRANS.UI.dealFail, CURRENT_LANG)}
                </div>
              )}
            </div>

            {/* Kategorien */}
            {cats.map((cat) => {
              const k = `${idx}:${cat.id}`;
              const cs = categoryScore(cat, p.answers);
              const answered = cat.questions.filter(q=>typeof p.answers[q.id]==="number").length;
              const wMap = weightsFor ? weightsFor(p.isMuslima) : null;
              const wDisp = (wMap && typeof wMap[cat.id]==="number") ? wMap[cat.id] : cat.weight;
              return (
                <div key={cat.id} style={ST.catBlock}>
                  <button style={ST.catHeader} onClick={()=>toggle(k)}>
                    <span style={{...ST.catDot,background:cat.color}}/>
                    <span style={ST.catName}>{cat.name}</span>
                    <span style={ST.catWeight}>{wDisp}%</span>
                    <span style={ST.catProgress}>{answered}/{cat.questions.length}</span>
                    <span style={ST.catVal}>{cs!==null?cs.toFixed(1):"–"}</span>
                    <span style={ST.chevron}>{open[k]?"▾":"▸"}</span>
                  </button>
                  {open[k] && (
                    <div style={ST.questionList}>
                      {cat.questions.map((q)=>(
                        <QuestionRow key={q.id} q={q} color={cat.color}
                          value={p.answers[q.id]} onChange={(v)=>setAnswer(idx,q.id,v)} />
                      ))}
                    </div>
                  )}
                </div>
              );
            })}

            <div style={ST.gutRow}>
              <div style={ST.catRowHead}>
                <span style={{...ST.catDot,background:"#444"}}/>
                <span style={ST.catName}>{L(TRANS.UI.gut, CURRENT_LANG)}</span>
                <span style={ST.catVal}>{p.gut}</span>
              </div>
              <input type="range" min="0" max="10" step="1" value={p.gut}
                onChange={(e)=>updatePartner(idx,{gut:Number(e.target.value)})}
                style={{...ST.slider,accentColor:"#444"}}/>
              <div style={ST.gutHint}>{L(TRANS.UI.gutHint, CURRENT_LANG)}</div>
            </div>
          </div>
        );
      })}
      <button onClick={addPartner} style={ST.addBtn}>{L(TRANS.UI.addPerson, CURRENT_LANG)}</button>
    </div>
  );
}

function QuestionRow({ q, color, value, onChange }) {
  if (q.type === "yesno") {
    return (
      <div style={ST.qRow}>
        <div style={ST.qText}>{q.text}</div>
        <div style={ST.yesnoRow}>
          {[["no",0],["partiallyLabel",5],["yes",10]].map(([lk,v])=>(
            <button key={lk} onClick={()=>onChange(v)}
              style={{...ST.yesnoBtn,...(value===v?{background:color,color:"#fff",borderColor:color}:{})}}>{L(TRANS.UI[lk],CURRENT_LANG)}</button>
          ))}
        </div>
      </div>
    );
  }
  return (
    <div style={ST.qRow}>
      <div style={ST.qTextRow}>
        <span style={ST.qText}>{q.text}</span>
        <span style={ST.qVal}>{typeof value==="number"?value:"–"}</span>
      </div>
      <input type="range" min="0" max="10" step="1" value={value === undefined || value === null ? 5 : value}
        onChange={(e)=>onChange(Number(e.target.value))}
        style={{...ST.slider,accentColor:color}}/>
    </div>
  );
}

/* ══════════════ Radar ══════════════ */
function RadarView({ partners, wish }) {
  const [mode, setMode] = useState("single");
  const [selA, setSelA] = useState(0);
  const [selB, setSelB] = useState(1);
  if (partners.length===0) return <div style={ST.empty}>Erfasse zuerst mindestens eine Person im Tab ‚Bewerten".</div>;

  const pA = partners[Math.min(selA,partners.length-1)];
  const axisCats = buildCategories(pA.isMuslima);
  const seriesFor = (p,color,label,dashed) => ({ label,color,dashed,
    values: axisCats.map((cat)=>{ const s=categoryScore(cat,p.answers); return s===null?0:s; }) });

  const series = [seriesFor(pA,"#1f7a5c",pA.name,false)];
  if (mode==="wish") series.push({ label:L(TRANS.UI.wishProfile,CURRENT_LANG), color:"#c0563b", dashed:true,
    values: axisCats.map((cat)=> typeof wish[cat.id]==="number"?wish[cat.id]:0) });
  if (mode==="compare" && partners.length>1) {
    const pB = partners[Math.min(selB,partners.length-1)];
    series.push(seriesFor(pB,"#3b6ec0",pB.name,false));
  }

  return (
    <div>
      <div style={ST.modeRow}>
        {[["single",L(TRANS.UI.radar_single,CURRENT_LANG)],["wish",L(TRANS.UI.radar_wish,CURRENT_LANG)],["compare",L(TRANS.UI.radar_compare,CURRENT_LANG)]].map(([id,l])=>(
          <button key={id} onClick={()=>setMode(id)} style={{...ST.modeBtn,...(mode===id?ST.modeActive:{})}}>{l}</button>
        ))}
      </div>
      <div style={ST.selectRow}>
        <label style={ST.selLabel}>{L(TRANS.UI.personA,CURRENT_LANG)}{" "}
          <select value={selA} onChange={(e)=>setSelA(Number(e.target.value))} style={ST.select}>
            {partners.map((p,i)=><option key={i} value={i}>{p.name}</option>)}
          </select>
        </label>
        {mode==="compare" && partners.length>1 && (
          <label style={ST.selLabel}>{L(TRANS.UI.personB,CURRENT_LANG)}{" "}
            <select value={selB} onChange={(e)=>setSelB(Number(e.target.value))} style={ST.select}>
              {partners.map((p,i)=><option key={i} value={i}>{p.name}</option>)}
            </select>
          </label>
        )}
      </div>
      <RadarChart axisCats={axisCats} series={series} />
      <div style={ST.legend}>
        {series.map((s,i)=>(
          <div key={i} style={ST.legendItem}>
            <span style={{...ST.legendDot,background:s.color,...(s.dashed?{opacity:0.6}:{})}}/>
            <span>{s.label}{s.dashed?L(TRANS.UI.target,CURRENT_LANG):""}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function RadarChart({ axisCats, series }) {
  const size=360, cx=size/2, cy=size/2, R=size/2-60, n=axisCats.length;
  const angle=(i)=>(Math.PI*2*i)/n - Math.PI/2;
  const point=(i,val)=>{ const r=(val/10)*R; return [cx+r*Math.cos(angle(i)), cy+r*Math.sin(angle(i))]; };
  return (
    <div style={{display:"flex",justifyContent:"center"}}>
      <svg viewBox={`0 0 ${size} ${size}`} style={{width:"100%",maxWidth:420}} role="img" aria-label="Wabennetz der Kategorien">
        {[2,4,6,8,10].map((rv)=>(
          <polygon key={rv} points={axisCats.map((_,i)=>point(i,rv).join(",")).join(" ")} fill="none" stroke="#e5ded2" strokeWidth="1"/>
        ))}
        {axisCats.map((_,i)=>{ const [x,y]=point(i,10); return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#e5ded2" strokeWidth="1"/>; })}
        {series.map((s,si)=>(
          <polygon key={si} points={s.values.map((v,i)=>point(i,v).join(",")).join(" ")}
            fill={s.color} fillOpacity={s.dashed?0.05:0.16} stroke={s.color} strokeWidth="2"
            strokeDasharray={s.dashed?"5 4":"0"} strokeLinejoin="round"/>
        ))}
        {series.map((s,si)=> s.values.map((v,i)=>{ const [x,y]=point(i,v); return <circle key={si+"-"+i} cx={x} cy={y} r="2.5" fill={s.color}/>; }))}
        {axisCats.map((cat,i)=>{
          const [x,y]=point(i,11.4);
          const anchor = Math.abs(x-cx)<12 ? "middle" : x<cx ? "end" : "start";
          return <text key={i} x={x} y={y} fontSize="9" fill="#5c574f" textAnchor={anchor} dominantBaseline="middle">{cat.short}</text>;
        })}
      </svg>
    </div>
  );
}

/* ══════════════ Ranking ══════════════ */
function Ranking({ partners, weightsFor }) {
  if (partners.length===0) return <div style={ST.empty}>{L(TRANS.UI.rank_empty, CURRENT_LANG)}</div>;
  const ranked = partners.map((p,i)=>({...p,idx:i,score:totalScore(p, weightsFor ? weightsFor(p.isMuslima) : null),failed:failedDealbreakers(p)})).sort((a,b)=>b.score-a.score);
  const maxScore = Math.max(...ranked.map(r=>r.score),1);
  return (
    <div>
      {ranked.map((r,pos)=>{
        const gutScaled=(r.gut/10)*100, gap=Math.abs(r.score-gutScaled), below=r.failed.length>0;
        return (
          <div key={r.idx} style={{...ST.rankCard,...(below?ST.rankCardMuted:{})}}>
            <div style={ST.rankHead}>
              <span style={ST.rankPos}>{pos+1}</span>
              <span style={ST.rankName}>{r.name}</span>
              <span style={ST.rankScore}>{r.score.toFixed(1)}</span>
            </div>
            {below && <div style={ST.rankWarn}>{L(TRANS.UI.belowThreshold,CURRENT_LANG)}{r.failed.length}{L(TRANS.UI.dbNotMet,CURRENT_LANG)}</div>}
            <div style={ST.barTrack}><div style={{...ST.barFill,width:`${(r.score/maxScore)*100}%`}}/></div>
            <div style={ST.compareRow}><span>{L(TRANS.UI.points,CURRENT_LANG)}: {r.score.toFixed(0)}</span><span>{L(TRANS.UI.gutShort,CURRENT_LANG)}: {gutScaled.toFixed(0)}</span></div>
            {gap>=20 && <div style={ST.gapNote}>{L(TRANS.UI.gap,CURRENT_LANG)} ({gap.toFixed(0)}). {L(TRANS.UI.gapTail,CURRENT_LANG)}</div>}
          </div>
        );
      })}
      <div style={ST.interpretBox}>
        {L(TRANS.UI.rankInterpret, CURRENT_LANG)}
      </div>
    </div>
  );
}

/* ══════════════ Wunschprofil (mit Drill-down) ══════════════ */
function Wunsch({ wish, setWish }) {
  const [open, setOpen] = useState({});
  const cats = buildCategories(true);
  const toggle = (id) => setOpen((s)=>({...s,[id]:!s[id]}));
  const setCat = (id,v)=>setWish({...wish,[id]:v});
  const setSub = (id,v)=>setWish({...wish,["sub_"+id]:v});
  return (
    <div>
      <p style={ST.wishIntro}>{L(TRANS.UI.wishIntro, CURRENT_LANG)}</p>
      {cats.map((cat)=>(
        <div key={cat.id} style={ST.wishCat}>
          <div style={ST.catRowHead}>
            <span style={{...ST.catDot,background:cat.color}}/>
            <span style={ST.catName}>{cat.name}</span>
            <button onClick={()=>toggle(cat.id)} style={ST.wishDrill}>{open[cat.id]?"▾":"▸"}</button>
            <span style={ST.catVal}>{typeof wish[cat.id]==="number"?wish[cat.id]:"–"}</span>
          </div>
          <input type="range" min="0" max="10" step="1" value={(wish[cat.id] === undefined || wish[cat.id] === null ? 5 : wish[cat.id])}
            onChange={(e)=>setCat(cat.id,Number(e.target.value))} style={{...ST.slider,accentColor:cat.color}}/>
          {open[cat.id] && (
            <div style={ST.wishSubList}>
              {cat.questions.map((q)=>(
                <div key={q.id} style={ST.wishSubRow}>
                  <div style={ST.qTextRow}>
                    <span style={ST.qTextSm}>{q.text}</span>
                    <span style={ST.qVal}>{typeof wish["sub_"+q.id]==="number"?wish["sub_"+q.id]:"–"}</span>
                  </div>
                  <input type="range" min="0" max="10" step="1" value={(wish["sub_"+q.id] === undefined || wish["sub_"+q.id] === null ? 5 : wish["sub_"+q.id])}
                    onChange={(e)=>setSub(q.id,Number(e.target.value))} style={{...ST.slider,accentColor:cat.color}}/>
                </div>
              ))}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

/* ══════════════ Kriterien ══════════════ */
function Kriterien({ weightsMuslima, weightsNicht }) {
  const [muslima,setMuslima]=useState(true);
  const weights = muslima ? weightsMuslima : weightsNicht;
  const cats=buildCategories(muslima).map((c)=>({...c, w: (weights && typeof weights[c.id]==="number") ? weights[c.id] : c.weight}))
    .sort((a,b)=>b.w-a.w);
  const sum=cats.reduce((a,c)=>a+c.w,0);
  return (
    <div>
      <div style={ST.dealInfo}>
        <strong>{L(TRANS.UI.dealHeader, CURRENT_LANG)}</strong>{L(TRANS.UI.dealOverride, CURRENT_LANG)}
        <ul style={ST.critList}>{dealbreakers(CURRENT_LANG).map(d=><li key={d.id} style={ST.critItem}>{d.text}</li>)}</ul>
      </div>
      <div style={ST.toggleRow}>
        <span style={ST.toggleLabel}>{L(TRANS.UI.view, CURRENT_LANG)}</span>
        <div style={ST.dbButtons}>
          {[["muslima",true],["nichtmuslima",false]].map(([lk,v])=>(
            <button key={lk} onClick={()=>setMuslima(v)} style={{...ST.dbBtn,...(muslima===v?ST.toggleActive:{})}}>{L(TRANS.UI[lk],CURRENT_LANG)}</button>
          ))}
        </div>
      </div>
      <div style={ST.sumRow}>{L(TRANS.UI.sumWeights,CURRENT_LANG)} {sum}%{L(TRANS.UI.sortedByWeight,CURRENT_LANG)}</div>
      {cats.map((cat)=>(
        <div key={cat.id} style={ST.critCard}>
          <div style={ST.critHead}>
            <span style={{...ST.catDot,background:cat.color}}/>
            <span style={ST.critName}>{cat.name}</span>
            <span style={ST.critWeight}>{cat.w}%</span>
          </div>
          <p style={ST.critNote}>{cat.note}</p>
          <ul style={ST.critList}>
            {cat.questions.map((q)=>(
              <li key={q.id} style={ST.critItem}>{q.text} <span style={ST.qType}>({q.type==="scale"?L(TRANS.UI.scaleLabel,CURRENT_LANG):L(TRANS.UI.yesnoLabel,CURRENT_LANG)})</span></li>
            ))}
          </ul>
        </div>
      ))}
    </div>
  );
}

/* ══════════════ Gewichtung: Presets + Fragebogen ══════════════ */
function Gewichtung({ presetId, setPresetId, qAnswers, setQAnswers, weightsMuslima, weightsNicht }) {
  const [showQ, setShowQ] = useState(false);
  const [view, setView] = useState(true); // true = Muslima-Ansicht
  const weights = view ? weightsMuslima : weightsNicht;
  const cats = buildCategories(view).map((c)=>({...c, w:(typeof weights[c.id]==="number"?weights[c.id]:c.weight)})).sort((a,b)=>b.w-a.w);
  const setQ = (id,v)=>setQAnswers({...qAnswers,[id]:v});
  return (
    <div>
      <p style={ST.wishIntro}>
        {L(TRANS.UI.gewIntro, CURRENT_LANG)}
      </p>
      <div style={ST.qWhenBox}>
        <div style={ST.qWhenTitle}>{L(TRANS.UI.qWhenTitle, CURRENT_LANG)}</div>
        <div style={ST.qWhenText}>{L(TRANS.UI.qWhenText, CURRENT_LANG)}</div>
      </div>

      <div style={ST.presetGrid}>
        {presets(CURRENT_LANG).map((p)=>(
          <button key={p.id} onClick={()=>setPresetId(p.id)}
            style={{...ST.presetCard,...(presetId===p.id?ST.presetActive:{})}}>
            <div style={ST.presetName}>{p.name}{presetId===p.id?"  ✓":""}</div>
            <div style={ST.presetDesc}>{p.desc}</div>
          </button>
        ))}
      </div>

      <button style={ST.qToggle} onClick={()=>setShowQ(!showQ)}>
        {showQ ? L(TRANS.UI.qToggleClose,CURRENT_LANG) : L(TRANS.UI.qToggleOpen,CURRENT_LANG)}
      </button>

      {showQ && (
        <div style={ST.qBox}>
          <p style={ST.qIntro}>{L(TRANS.UI.qBoxIntro, CURRENT_LANG)}</p>
          {QUESTIONNAIRE.map((qDef)=>{ const q = { id:qDef.id, text:L(TRANS.QUEST[qDef.id].text,CURRENT_LANG), left:L(TRANS.QUEST[qDef.id].left,CURRENT_LANG), right:L(TRANS.QUEST[qDef.id].right,CURRENT_LANG) };
            const v = typeof qAnswers[q.id]==="number" ? qAnswers[q.id] : 0.5;
            return (
              <div key={q.id} style={ST.qItem}>
                <div style={ST.qLabel}>{q.text}</div>
                <input type="range" min="0" max="1" step="0.1" value={v}
                  onChange={(e)=>setQ(q.id,Number(e.target.value))}
                  style={{...ST.slider,accentColor:"#1f7a5c"}}/>
                <div style={ST.qEnds}><span>{q.left}</span><span>{q.right}</span></div>
              </div>
            );
          })}
          <button style={ST.qReset} onClick={()=>setQAnswers({})}>{L(TRANS.UI.qReset, CURRENT_LANG)}</button>
        </div>
      )}

      <div style={ST.weightPreview}>
        <div style={ST.toggleRow}>
          <span style={ST.toggleLabel}>{L(TRANS.UI.previewLabel, CURRENT_LANG)}</span>
          <div style={ST.dbButtons}>
            {[["muslima",true],["nichtmuslima",false]].map(([lk,val])=>(
              <button key={lk} onClick={()=>setView(val)} style={{...ST.dbBtn,...(view===val?ST.toggleActive:{})}}>{L(TRANS.UI[lk],CURRENT_LANG)}</button>
            ))}
          </div>
        </div>
        <div style={ST.sumRow}>{L(TRANS.UI.resultWeights, CURRENT_LANG)}</div>
        {cats.map((cat)=>(
          <div key={cat.id} style={ST.wBar}>
            <span style={ST.wBarName}>{cat.name}</span>
            <div style={ST.wBarTrack}><div style={{...ST.wBarFill,width:`${cat.w*3}%`,background:cat.color}}/></div>
            <span style={ST.wBarVal}>{cat.w}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

<script>
  (function(){
    function boot(){

        return setTimeout(boot, 50);

        (new Function(compiled))();
      } catch (err) {
        var r = document.getElementById("root");

        }
      }
    }
    boot();
  })();
